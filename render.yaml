services:
  - type: web
    name: dailyshopclose-web
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /Dailyshopclose/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_PATH
        value: /Dailyshopclose
      - key: DATABASE_URL
        fromDatabase:
          name: dailyshopclose-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: dailyshopclose-db
    plan: free
